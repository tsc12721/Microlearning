<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TC Just in Time Learning Machine</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Compiler for Inline JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind Configuration for Custom Animations -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'shimmer': 'shimmer 2.5s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            }
          }
        }
      }
    }
  </script>

  <!-- Custom CSS for Scrollbars & Refined UI Transitions -->
  <style>
    /* Premium custom scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #334155;
    }
    body {
      background-color: #020617;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen">

  <!-- React Root Node -->
  <div id="root"></div>

  <!-- React Core Script Application -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // API Configuration
    // If downloading to run locally, replace with your "AIzaSy..." key from Google AI Studio.
    const apiKey = "AQ.Ab8RN6JlCzw2ZUvd9k5AaHxZ-QeLvlJGNNr1gR45NgxTWvLBpg"; 

    function App() {
      // Step States: 'setup' | 'extracting_models' | 'view_models' | 'extracting_landscape' | 'view_landscape' | 'generating_questions' | 'testing' | 'complete'
      const [step, setStep] = useState('setup'); 
      const [field, setField] = useState('');
      const [sources, setSources] = useState('');
      const [error, setError] = useState('');
      
      // Framework Output States
      const [mentalModels, setMentalModels] = useState('');
      const [landscape, setLandscape] = useState('');
      const [questions, setQuestions] = useState([]); // Array of objects: { id, question, objective }
      
      // Interactive Active Recall State Tracker
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [answers, setAnswers] = useState({}); // { index: answerText }
      const [evaluations, setEvaluations] = useState({}); // { index: { score, isFullyCorrect, strengths, gaps, masterExplanation } }
      const [evaluating, setEvaluating] = useState(false);

      // Workspace configuration tab index
      const [activeTab, setActiveTab] = useState('models'); // 'models' | 'landscape' | 'sources'

      // Custom React-State Confirm Dialogs (to bypass restricted browser alert boxes)
      const [showConfirmFinish, setShowConfirmFinish] = useState(false);
      const [showConfirmReset, setShowConfirmReset] = useState(false);

      // --- API HELPER WITH RETRY, EXPONENTIAL BACKOFF & MODEL FALLBACKS ---
      const callGemini = async (prompt, systemInstruction = "", useJson = false, jsonSchema = null) => {
        // List of candidate models to try in sequence of stability and preference
        const candidateModels = [
          "gemini-2.5-flash",
          "gemini-1.5-flash",
          "gemini-2.5-flash-preview-09-2025"
        ];
        
        let lastError = null;

        // Try each candidate model
        for (const model of candidateModels) {
          let delay = 1000;
          
          for (let i = 0; i < 5; i++) {
            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
              
              const payload = {
                contents: [{ parts: [{ text: prompt }] }]
              };

              if (systemInstruction) {
                payload.systemInstruction = { parts: [{ text: systemInstruction }] };
              }

              if (useJson) {
                payload.generationConfig = {
                  responseMimeType: "application/json",
                  ...(jsonSchema && { responseSchema: jsonSchema })
                };
              }

              const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              
              if (res.ok) {
                const data = await res.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) return text;
                throw new Error("Received empty content response from Gemini API.");
              } else {
                const errData = await res.json().catch(() => ({}));
                const errMsg = errData.error?.message || `HTTP Status ${res.status}`;
                
                // If model is not found (404) or unsupported (400), instantly switch to the next model
                if (res.status === 404 || (res.status === 400 && (errMsg.includes("not found") || errMsg.includes("not supported")))) {
                  throw new Error(`ModelFallback: ${model} is unavailable. Trying next candidate.`);
                }
                
                // If it's a fatal authorization or invalid key error (403), stop everything immediately
                if (res.status === 403) {
                  throw new Error(`API Configuration Error: Your API key is invalid or unauthorized. (${errMsg})`);
                }
                
                throw new Error(`Temporary Connection Issue (${res.status}): ${errMsg}`);
              }
            } catch (err) {
              lastError = err;
              
              // Halt immediately for fatal configurations
              if (err.message.startsWith("API Configuration Error:")) {
                throw err;
              }
              
              // Skip the remaining retry attempts for this model if it's not found on the endpoint
              if (err.message.includes("ModelFallback:")) {
                break; 
              }
            }
            
            // Wait for exponential backoff delay
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
        
        throw lastError || new Error("All candidate models failed to connect.");
      };

      // --- STEP CONTROLLERS ---

      const handleStartFramework = async () => {
        if (!field.trim()) {
          setError("Please specify a subject field or concept to start.");
          return;
        }
        setError('');
        setStep('extracting_models');
        
        try {
          const prompt = `
            You are an elite, world-class educator helping a student compress a semester of learning into a 48-hour window.
            Subject Field: ${field}
            Provided Context / Source Material: ${sources || "None provided. Use your comprehensive expert knowledge base of the subject."}
            
            Examine this subject deeply. What are the 5 core mental models that every expert in this field shares?
            Instead of getting bogged down in granular details or basic dictionary definitions, uncover the foundational high-level paradigms, perspectives, and frameworks that professors typically spend entire careers developing.
            
            Provide detailed, comprehensive markdown formatting. Include bold headers for each mental model, a theoretical overview, a practical application scenario, and an expert quote representing that perspective.
          `;
          const systemPrompt = "You are a distinguished MIT distinguished Professor specializing in accelerated comprehension methodologies.";
          const response = await callGemini(prompt, systemPrompt);
          setMentalModels(response);
          setStep('view_models');
        } catch (err) {
          setError(err.message || "An error occurred while compiling mental models.");
          setStep('setup');
        }
      };

      const handleMapLandscape = async () => {
        setStep('extracting_landscape');
        setError('');
        
        try {
          const prompt = `
            The subject field is: ${field}.
            Provided Context / Source Material: ${sources || "None provided."}
            
            Once the core models are established, experts must understand where the boundaries, controversies, and paradoxes of the field lie.
            Identify and map the 3 places/areas where researchers and practitioners in this field fundamentally disagree.
            
            For each of the 3 points of disagreement:
            1. Name the central intellectual debate.
            2. Detail Side A's core premise, logic, and their strongest academic argument.
            3. Detail Side B's core premise, logic, and their strongest academic argument.
            4. State the modern synthesis, consensus, or why the paradox remains unresolved.
            
            Format beautifully and directly using rich markdown.
          `;
          const systemPrompt = "You are an analytical researcher mapping the active debates and unresolved controversies of complex academic fields.";
          const response = await callGemini(prompt, systemPrompt);
          setLandscape(response);
          setStep('view_landscape');
        } catch (err) {
          setError(err.message || "An error occurred while mapping the controversy landscape.");
          setStep('view_models');
        }
      };

      const handleGenerateQuestions = async () => {
        setStep('generating_questions');
        setError('');
        
        try {
          const prompt = `
            The subject field is: ${field}.
            Based on the previous mental models and debates, generate exactly 10 comprehensive, high-level active recall questions.
            These questions must be designed to expose whether someone deeply understands the structural logic of the subject versus someone who simply memorized basic definitions or facts. 
            Focus on real-world edge cases, decision dilemmas, or theoretical synthesis.
            
            Format your response strictly as a JSON list matching this schema:
            Array of objects, each containing:
            - "id" (integer, 1-10)
            - "question" (string, the deep interrogative scenario or question)
            - "objective" (string, what exact cognitive node or mental framework this question is testing)
          `;
          const systemPrompt = "You are an elite academic board testing students for qualifying doctorate level examinations. Output JSON only.";
          
          const schema = {
            type: "ARRAY",
            items: {
              type: "OBJECT",
              properties: {
                id: { type: "INTEGER" },
                question: { type: "STRING" },
                objective: { type: "STRING" }
              },
              required: ["id", "question", "objective"]
            }
          };

          const responseText = await callGemini(prompt, systemPrompt, true, schema);
          const parsedQuestions = JSON.parse(responseText);
          
          if (Array.isArray(parsedQuestions) && parsedQuestions.length > 0) {
            setQuestions(parsedQuestions);
            setStep('testing');
            setCurrentQIndex(0);
          } else {
            throw new Error("Failed to format assessment bank correctly.");
          }
        } catch (err) {
          setError(err.message || "An error occurred while building the active self-testing bank.");
          setStep('view_landscape');
        }
      };

      const handleEvaluateAnswer = async () => {
        const currentQ = questions[currentQIndex];
        const answer = answers[currentQIndex] || "";
        if (!answer.trim()) {
          setError("Please compose your active recall synthesis before submitting.");
          return;
        }
        setError('');
        setEvaluating(true);

        try {
          const prompt = `
            We are doing active testing for: ${field}.
            The student is answering this scenario question:
            "${currentQ.question}"
            The question's evaluation objective is: "${currentQ.objective}"
            
            The student has formulated this conceptual synthesis answer:
            "${answer}"
            
            Act as an incredibly rigorous, supportive, but precise MIT evaluation professor. Assess their answer.
            Identify conceptual gaps, factual errors, or missed nodes based on the core mental models. Provide detailed, expert feedback explaining what they missed and why, along with a master-level correction they should study.
            
            Format your response strictly as a JSON object matching this schema:
            {
              "score": integer (0 to 100),
              "isFullyCorrect": boolean (true only if they hit all key conceptual nodes without core gaps),
              "strengths": string (the concepts they explained perfectly),
              "gaps": string (detailed explanation of what they missed, why their explanation is incomplete, and where the logic fell short),
              "masterExplanation": string (the definitive comprehensive explanation and correct academic synthesis they must internalize)
            }
          `;
          const systemPrompt = "You are a world-class educational examiner that values high-level comprehension over rote recall. Output JSON only.";
          
          const schema = {
            type: "OBJECT",
            properties: {
              score: { type: "INTEGER" },
              isFullyCorrect: { type: "BOOLEAN" },
              strengths: { type: "STRING" },
              gaps: { type: "STRING" },
              masterExplanation: { type: "STRING" }
            },
            required: ["score", "isFullyCorrect", "strengths", "gaps", "masterExplanation"]
          };

          const responseText = await callGemini(prompt, systemPrompt, true, schema);
          const evalData = JSON.parse(responseText);
          
          setEvaluations(prev => ({
            ...prev,
            [currentQIndex]: evalData
          }));
        } catch (err) {
          setError(err.message || "Could not evaluate answer at this time.");
        } finally {
          setEvaluating(false);
        }
      };

      const handleNextQuestion = () => {
        if (currentQIndex < questions.length - 1) {
          setCurrentQIndex(prev => prev + 1);
          setError('');
        } else {
          setStep('complete');
        }
      };

      // Custom Markdown Parser to guarantee layout presentation without extra NPM frameworks
      const renderMarkdown = (text) => {
        if (!text) return null;
        const lines = text.split('\n');
        return lines.map((line, index) => {
          if (line.startsWith('### ')) {
            return (
              <h3 key={index} className="text-base font-bold text-teal-300 mt-5 mb-2 flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-teal-400"></span>
                {line.replace('### ', '')}
              </h3>
            );
          }
          if (line.startsWith('## ')) {
            return <h2 key={index} className="text-lg font-bold text-teal-400 mt-6 mb-3 border-b border-slate-800 pb-1.5">{line.replace('## ', '')}</h2>;
          }
          if (line.startsWith('# ')) {
            return <h1 key={index} className="text-xl font-black text-white mt-8 mb-4 border-l-4 border-teal-500 pl-3">{line.replace('# ', '')}</h1>;
          }
          if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
            const content = line.trim().replace(/^[-*]\s+/, '');
            return (
              <li key={index} className="ml-5 list-disc text-slate-300 my-1.5 leading-relaxed text-sm">
                {parseInlineStyles(content)}
              </li>
            );
          }
          if (line.trim() === '') {
            return <div key={index} className="h-3" />;
          }
          return (
            <p key={index} className="text-slate-300 my-2 leading-relaxed text-sm">
              {parseInlineStyles(line)}
            </p>
          );
        });
      };

      const parseInlineStyles = (text) => {
        const parts = text.split(/\*\*(.*?)\*\*/g);
        return parts.map((part, index) => {
          if (index % 2 === 1) {
            return <strong key={index} className="text-teal-300 font-semibold">{part}</strong>;
          }
          return part;
        });
      };

      const handleReset = () => {
        setStep('setup');
        setField('');
        setSources('');
        setMentalModels('');
        setLandscape('');
        setQuestions([]);
        setCurrentQIndex(0);
        setAnswers({});
        setEvaluations({});
        setError('');
        setShowConfirmReset(false);
      };

      const completedCount = Object.keys(evaluations).length;
      const averageScore = completedCount > 0 
        ? Math.round(Object.values(evaluations).reduce((sum, ev) => sum + ev.score, 0) / completedCount) 
        : 0;

      return (
        <div className="min-h-screen flex flex-col font-sans bg-slate-950 selection:bg-teal-500/30 selection:text-teal-200">
          
          {/* Main Workspace Header */}
          <header className="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex flex-wrap items-center justify-between gap-4 shadow-xl">
            <div className="flex items-center gap-3">
              <div className="relative flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-emerald-600 shadow-lg shadow-teal-500/20">
                <svg className="w-5 h-5 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <div className="absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full border-2 border-slate-950 animate-pulse" />
              </div>
              <div>
                <h1 className="text-base md:text-lg font-black tracking-tight bg-gradient-to-r from-teal-300 via-emerald-400 to-cyan-300 bg-clip-text text-transparent uppercase">
                  TC Just In Time Learning Machine
                </h1>
                <p className="text-[10px] text-slate-400 font-bold tracking-wider uppercase">MIT Accelerated Paradigm</p>
              </div>
            </div>

            {/* Quick Action Controller */}
            {step !== 'setup' && (
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setShowConfirmReset(true)}
                  className="text-[10px] uppercase tracking-wider font-bold px-3.5 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white rounded-lg border border-slate-700/60 transition-all"
                >
                  Reset Terminal
                </button>
              </div>
            )}
          </header>

          {/* Navigational Step Progress Indicators */}
          {step !== 'setup' && (
            <div className="bg-slate-900/60 border-b border-slate-800/80 p-4 px-6 flex flex-wrap items-center justify-between gap-4">
              <div className="flex flex-col">
                <span className="text-[10px] text-teal-400 font-bold tracking-wider uppercase">Active Study Discipline</span>
                <h2 className="text-sm font-bold text-slate-200 mt-0.5">{field}</h2>
              </div>
              
              <div className="flex items-center gap-2 text-[11px] font-medium text-slate-400">
                <span className={`px-2 py-0.5 rounded ${step === 'view_models' ? 'bg-teal-500/10 text-teal-300 font-bold' : ''}`}>1. Mental Models</span>
                <span>➔</span>
                <span className={`px-2 py-0.5 rounded ${step === 'view_landscape' ? 'bg-teal-500/10 text-teal-300 font-bold' : ''}`}>2. Controversy Frontier</span>
                <span>➔</span>
                <span className={`px-2 py-0.5 rounded ${step === 'testing' || step === 'complete' ? 'bg-teal-500/10 text-teal-300 font-bold' : ''}`}>3. Scenario Testing</span>
              </div>
            </div>
          )}

          {/* Main Layout Body Workspace */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 flex flex-col justify-start">

            {/* SCREEN 1: Study Parameter Setup */}
            {step === 'setup' && (
              <div className="max-w-3xl mx-auto w-full mt-6">
                
                {/* Visual Description Panel */}
                <div className="relative overflow-hidden bg-slate-900 border border-slate-800/80 p-8 rounded-2xl w-full text-center shadow-2xl mb-6">
                  <div className="absolute inset-0 bg-gradient-to-tr from-teal-500/5 via-transparent to-transparent" />
                  <div className="relative z-10 space-y-3">
                    <div className="inline-flex items-center justify-center p-3 rounded-xl bg-teal-500/10 text-teal-400 border border-teal-500/20">
                      <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                      </svg>
                    </div>
                    <h2 className="text-2xl font-black text-white">48-Hour Semester Compression Terminal</h2>
                    <p className="text-xs text-slate-400 max-w-lg mx-auto leading-relaxed">
                      Transform complex fields of study into structured intellectual models, unpack unresolved controversies, and conduct doctorate-level active recall scenario training.
                    </p>
                  </div>
                </div>

                {/* Study Parameters Form */}
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 md:p-8 shadow-xl space-y-6">
                  <h3 className="text-xs font-bold text-teal-400 tracking-wider uppercase flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 rounded-full bg-teal-400 animate-pulse"></span>
                    Launch Parameter Console
                  </h3>

                  <div className="space-y-4">
                    <div>
                      <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                        Specify Subject Field
                      </label>
                      <input
                        type="text"
                        value={field}
                        onChange={(e) => setField(e.target.value)}
                        placeholder="e.g., Epigenetics, Behavioral Game Theory, Quantum Computing"
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 px-4 text-slate-100 placeholder-slate-650 focus:outline-none focus:border-teal-500/60 transition-all text-sm"
                      />
                    </div>

                    <div>
                      <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">
                        Provided Reference Materials / Syllabus (Optional)
                      </label>
                      <textarea
                        value={sources}
                        onChange={(e) => setSources(e.target.value)}
                        placeholder="Paste curriculum outlines, lecture scripts, syllabus files, or course text logs here to direct and ground the model extraction phase..."
                        rows="5"
                        className="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 px-4 text-slate-100 placeholder-slate-650 focus:outline-none focus:border-teal-500/60 transition-all text-xs font-mono leading-relaxed"
                      />
                    </div>

                    {error && (
                      <div className="bg-rose-500/10 border border-rose-500/20 text-rose-300 p-3 rounded-lg text-xs flex items-center gap-2">
                        <span className="w-1.5 h-1.5 bg-rose-400 rounded-full text-rose-450 font-bold flex-shrink-0">⚠️</span>
                        <span className="leading-normal">{error}</span>
                      </div>
                    )}

                    <button
                      onClick={handleStartFramework}
                      className="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-400 hover:to-emerald-500 text-slate-950 font-black py-3.5 rounded-lg transition-all shadow-md shadow-teal-500/10 flex items-center justify-center gap-2 uppercase tracking-wide text-xs"
                    >
                      <span>Build Academic Scaffold</span>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                      </svg>
                    </button>
                  </div>
                </div>

              </div>
            )}

            {/* LOADING SCREENS */}
            {(step === 'extracting_models' || step === 'extracting_landscape' || step === 'generating_questions') && (
              <div className="max-w-xl mx-auto w-full mt-12 bg-slate-900 border border-slate-800 p-8 rounded-xl shadow-2xl flex flex-col items-center text-center space-y-5">
                <div className="relative w-16 h-16 flex items-center justify-center">
                  <div className="absolute inset-0 rounded-full border-4 border-teal-500/10 animate-pulse-slow" />
                  <div className="absolute inset-0 rounded-full border-4 border-t-teal-400 animate-spin" />
                  <svg className="w-6 h-6 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                  </svg>
                </div>
                <div>
                  <h3 className="text-base font-bold text-white uppercase animate-pulse">
                    {step === 'extracting_models' && "Synthesizing Core Mental Models"}
                    {step === 'extracting_landscape' && "Mapping Controversy Landscape"}
                    {step === 'generating_questions' && "Drafting Active Recall Assessment Deck"}
                  </h3>
                  <p className="text-xs text-slate-400 max-w-sm mt-1.5 leading-relaxed">
                    {step === 'extracting_models' && "Isolating structural parameters and master frameworks of the subject."}
                    {step === 'extracting_landscape' && "Mapping key debates, expert arguments, and unresolved intellectual boundaries."}
                    {step === 'generating_questions' && "Assembling qualitative active recall scenario challenges."}
                  </p>
                </div>
                <div className="w-full bg-slate-950 h-1.5 rounded-full overflow-hidden border border-slate-800">
                  <div className="bg-gradient-to-r from-teal-500 to-emerald-500 h-full animate-shimmer bg-[length:200%_auto]" style={{ width: '100%' }} />
                </div>
              </div>
            )}

            {/* SCREEN 2: View extracted Mental Models */}
            {step === 'view_models' && (

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render the React App
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
